services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: web
      HTTP_ADDR: :8080
      TRADE_DB_PATH: /app/data/trade.db
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - frontend
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:-}
    profiles:
      - tunnel
