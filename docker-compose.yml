services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODE: web
      HTTP_ADDR: :8080
      TRADE_DB_PATH: /app/data/trade.db
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
