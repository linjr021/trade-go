stages:
  - deploy

deploy_prod:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache openssh-client bash
    - eval "$(ssh-agent -s)"
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - chmod 700 ~/.ssh
    - ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
        set -euo pipefail
        cd \"${DEPLOY_PATH:-/opt/trade-go}\"
        if [ ! -f scripts/deploy_update.sh ]; then
          echo '[gitlab-ci][ERROR] scripts/deploy_update.sh 不存在，请先同步服务器代码'
          exit 1
        fi
        chmod +x scripts/deploy_update.sh
        PROJECT_DIR=\"${DEPLOY_PATH:-/opt/trade-go}\" \
        BRANCH=\"${CI_COMMIT_BRANCH}\" \
        NO_BUILD=\"${NO_BUILD:-false}\" \
        WITH_TUNNEL=\"${WITH_TUNNEL:-auto}\" \
        bash scripts/deploy_update.sh
      "

